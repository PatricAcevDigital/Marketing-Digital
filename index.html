index.<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubre los Mejores Cursos de Hotmart</title>
    <meta name="description" content="Explora los cursos más rentables de Hotmart y comienza a generar ingresos desde cualquier parte del mundo.">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f8f8f8; }
        .container { max-width: 600px; margin: auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .button { padding: 15px; background-color: #ff6600; color: white; font-size: 18px; border: none; cursor: pointer; border-radius: 5px; }
        .button:hover { background-color: #ff3300; }
        ul { list-style: none; padding: 0; }
        li { margin: 10px 0; font-size: 18px; }
        a { text-decoration: none; color: #ff6600; font-weight: bold; }
        a:hover { color: #ff3300; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">🔥 Descubre los Mejores Cursos de Hotmart 🔥</h1>
        <p id="description">Explora oportunidades de formación y comienza a generar ingresos pasivos.</p>

        <ul id="course-list">
            <li><a href="https://go.hotmart.com/L99539382I" target="_blank">Curso 1: Aprende a ganar dinero con Hotmart</a></li>
            <li><a href="https://go.hotmart.com/LXXXXX" target="_blank">Curso 2: Marketing Digital Avanzado</a></li>
            <li><a href="https://go.hotmart.com/LYYYYY" target="_blank">Curso 3: Automatización y Negocios Online</a></li>
        </ul>

        <button class="button" onclick="redirect()">👉 Accede a los cursos aquí</button>
    </div>

    <script>
        let url = "https://go.hotmart.com/L99539382I";

        function redirect() {
            window.location.href = url;
        }

        // Lista de idiomas por país (esto se puede ampliar)
        let countryLang = {
            "ES": "es", "MX": "es", "AR": "es", "CL": "es", "US": "en", "GB": "en", "FR": "fr", "BR": "pt"
        };

        let translations = {
            "es": { "title": "🔥 Descubre los Mejores Cursos de Hotmart 🔥", "description": "Explora oportunidades de formación y comienza a generar ingresos pasivos." },
            "en": { "title": "🔥 Discover the Best Hotmart Courses 🔥", "description": "Explore top training opportunities and start earning passive income." },
            "pt": { "title": "🔥 Descubra os Melhores Cursos da Hotmart 🔥", "description": "Explore oportunidades de formação e comece a gerar renda passiva." },
            "fr": { "title": "🔥 Découvrez les Meilleurs Cours Hotmart 🔥", "description": "Explorez les meilleures formations et commencez à générer des revenus passifs." }
        };

        function setLanguage(lang) {
            if (!translations[lang]) lang = "es"; 
            document.getElementById("title").innerText = translations[lang].title;
            document.getElementById("description").innerText = translations[lang].description;
        }

        // Obtener ubicación del usuario
        fetch("https://ipapi.co/json/")
            .then(response => response.json())
            .then(data => {
                let countryCode = data.country_code;
                let lang = countryLang[countryCode] || "es";
                setLanguage(lang);
            })
            .catch(() => {
                // Si falla, usar el idioma del navegador
                let userLang = navigator.language.substring(0,2);
                setLanguage(userLang);
            });

    </script>

</body>
</html>
