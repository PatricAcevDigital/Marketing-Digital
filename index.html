<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Afiliados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Descubre lo que el mundo tiene para ti. ¿Cuál será tu próxima gran oportunidad?</h1>
    </header>

    <section id="formulario">
        <h2>Agregar Nuevo Producto</h2>
        <form id="productoForm">
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
            <input type="url" id="imagen" placeholder="URL de la imagen" required>
            <input type="url" id="codigo" placeholder="Código de divulgación" required>
            <select id="categoria">
                <option value="digital">Digital</option>
                <option value="bebes">Bebés y Niños</option>
                <option value="mamas">Mamás Abrazadas</option>
                <option value="salud">Alimentación y Salud</option>
                <option value="deporte">Deporte Saludable</option>
            </select>
            <button type="submit">Agregar Producto</button>
        </form>
    </section>

    <section id="productos">
        <h2>Productos</h2>
        <div id="productosContainer"></div>
        <div id="paginacion"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
