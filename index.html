<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afiliados Hotmart</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .producto { border: 1px solid #ddd; padding: 10px; margin: 10px; width: 300px; text-align: center; }
        .producto img { width: 100%; }
    </style>
</head>
<body>
    <h2>Agregar Producto</h2>
    <form id="productoForm">
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <input type="text" id="imagen" placeholder="URL de imagen" required>
        <input type="text" id="enlace" placeholder="URL de afiliado" required>
        <button type="submit">Agregar</button>
    </form>

    <h2>Lista de Productos</h2>
    <div id="productos"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            cargarProductos();
        });

        document.getElementById("productoForm").addEventListener("submit", function(event) {
            event.preventDefault();

            let nombre = document.getElementById("nombre").value;
            let imagen = document.getElementById("imagen").value;
            let enlace = document.getElementById("enlace").value;

            let producto = { nombre, imagen, enlace };
            let productos = JSON.parse(localStorage.getItem("productos")) || [];
            productos.push(producto);
            localStorage.setItem("productos", JSON.stringify(productos));

            mostrarProducto(producto);
            document.getElementById("productoForm").reset();
        });

        function mostrarProducto(producto) {
            let nuevoProducto = `
                <div class="producto">
                    <img src="${producto.imagen}" alt="${producto.nombre}">
                    <h3>${producto.nombre}</h3>
                    <a href="${producto.enlace}" target="_blank">Comprar ahora</a>
                </div>
            `;
            document.getElementById("productos").innerHTML += nuevoProducto;
        }

        function cargarProductos() {
            let productos = JSON.parse(localStorage.getItem("productos")) || [];
            productos.forEach(mostrarProducto);
        }
    </script>
</body>
</html>
